apiVersion: apps/v1
kind: Deployment
metadata:
  name: ang-test-deployment
  namespace: ai-workloads
  labels:
    app: ang-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ang-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ang-test
    spec:
      containers:
        - name: ang-test
          image: ghcr.io/clawopen-lgtm/ang_test:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3