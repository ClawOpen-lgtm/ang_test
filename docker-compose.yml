version: '3.8'

services:
  ang_test:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    volumes:
      # Uncomment for development to enable hot-reload (requires npm start in container)
      # - ./src:/app/src
      # - ./angular.json:/app/angular.json
      # - ./package.json:/app/package.json
      # - ./tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s